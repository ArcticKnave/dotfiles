[bar.default]
center = []
end = [
    "tray",
    "notifications",
    "power_profile",
    "clipboard",
    "bluetooth",
    "brightness",
    "volume",
    "network",
    "battery",
    "clock"
]
margin_edge = 0
margin_ends = 0
position = "bottom"
radius = 0
shadow = false
start = [ "session", "workspaces" ]

[location]
address = "Waterford, Ireland"

[lockscreen_widgets]
enabled = false
schema_version = 2
widget_order = [ "lockscreen-login-box@eDP-1" ]

    [lockscreen_widgets.grid]
    cell_size = 16
    major_interval = 4
    visible = true

    [lockscreen_widgets.widget."lockscreen-login-box@eDP-1"]
    box_height = 0.0
    box_width = 0.0
    cx = 854.0
    cy = 944.0
    output = "eDP-1"
    rotation = 0.0
    type = "login_box"

        [lockscreen_widgets.widget."lockscreen-login-box@eDP-1".settings]
        background_color = "surface_variant"
        background_opacity = 0.88
        background_radius = 12.0
        input_opacity = 1.0
        input_radius = 6.0
        show_login_button = true

[osd]
background_opacity = 0.99999997764825821
position = "bottom_right"

[[plugins.source]]
auto_update = true
kind = "git"
location = "https://github.com/noctalia-dev/official-plugins"
name = "official"

[[plugins.source]]
auto_update = true
kind = "git"
location = "https://github.com/noctalia-dev/community-plugins"
name = "community"

[shell]
font_family = "Noto Sans"
settings_show_advanced = true
show_location = false

    [shell.animation]
    enabled = false

[theme]
builtin = "Tokyo-Night"
community_palette = "Rosey AMOLED"
source = "community"

    [theme.templates]
    builtin_ids = [ "gtk3", "gtk4", "ghostty", "kcolorscheme", "niri", "qt" ]
    community_ids = [ "neovim", "rofi", "telegram", "yazi" ]

[wallpaper]
transition = [ "fade" ]
transition_duration = 100

[widget.battery]
hide_when_plugged = true

[widget.brightness]
show_label = false

[widget.network]
show_label = false

[widget.session]
color = "primary"
scale = 1.2

[widget.volume]
show_label = false

[widget.workspaces]
minimal = true
scale = 1.5
